name: italy_quiz_app
description: 義大利駕照測驗 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1

  # 登入
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  crypto: ^3.0.3

  # 數據庫
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # 狀態管理（未來擴展用）
  provider: ^6.1.1
  
  # 本地存儲
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  in_app_purchase: ^3.2.3
  
  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0
  url_launcher: ^6.3.1
  flutter_tts: ^4.2.5
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/italy_quiz.db
    - assets/images/
    - images/img_sign/
    - docs/licenses/fonts/

  fonts:
    - family: NotoSansSC
      fonts:
        - asset: assets/fonts/noto/NotoSansCJKsc-Regular.otf
          weight: 400
        - asset: assets/fonts/noto/NotoSansCJKsc-Medium.otf
          weight: 500
        - asset: assets/fonts/noto/NotoSansCJKsc-Medium.otf
          weight: 600
        - asset: assets/fonts/noto/NotoSansCJKsc-Bold.otf
          weight: 700
        - asset: assets/fonts/noto/NotoSansCJKsc-Bold.otf
          weight: 800
    - family: NotoSans
      fonts:
        - asset: assets/fonts/noto/NotoSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/noto/NotoSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/noto/NotoSans-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/noto/NotoSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/noto/NotoSans-Bold.ttf
          weight: 800
    - family: NotoNastaliqUrdu
      fonts:
        - asset: assets/fonts/noto/NotoNastaliqUrdu-Regular.ttf
          weight: 400
        - asset: assets/fonts/noto/NotoNastaliqUrdu-Bold.ttf
          weight: 700
    - family: NotoSansGurmukhi
      fonts:
        - asset: assets/fonts/noto/NotoSansGurmukhi-Regular.ttf
          weight: 400
        - asset: assets/fonts/noto/NotoSansGurmukhi-Medium.ttf
          weight: 500
        - asset: assets/fonts/noto/NotoSansGurmukhi-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/noto/NotoSansGurmukhi-Bold.ttf
          weight: 700
        - asset: assets/fonts/noto/NotoSansGurmukhi-Bold.ttf
          weight: 800

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true  # 必须开启这个，移除透明度
  adaptive_icon_background: "#3B82F6"
  adaptive_icon_foreground: "assets/images/app_icon.png"
