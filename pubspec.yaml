name: italy_quiz_app
description: 義大利駕照測驗 App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # 數據庫
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  
  # 狀態管理（未來擴展用）
  provider: ^6.1.1
  
  # 本地存儲
  shared_preferences: ^2.2.2
  
  # UI
  cupertino_icons: ^1.0.6
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - italy_quiz.db
    - images/img_sign/

